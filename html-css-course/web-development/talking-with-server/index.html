<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <input type="text" placeholder="Only letter" class="teste-input" />
    </body>

    <script>
        const input = document.querySelector('.teste-input');

        input.addEventListener('keydown', function (e) {
            if (!isLetter(e.key)) {
                e.preventDefault();
            }
        });

        function isLetter(letter) {
            return /^[a-zA-Z]$/.test(letter);
        }
    </script>
</html>
