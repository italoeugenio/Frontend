<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Buttons - Effecs</title>
        <style>
            .sub {
                background-color: rgb(200, 0, 0);
                color: white;
                border: none;
                height: 50px;
                width: 150px;
                border-radius: 2px;
                cursor: pointer;
                margin-right: 5px;
                transition:
                    background-color 3s,
                    color 1s;
            }

            .sub:hover {
                background-color: rgb(255, 0, 174);
            }
            .sub:active {
                background-color: rgb(107, 234, 103);
            }

            .join {
                background-color: white;
                color: rgb(41, 118, 211);
                height: 36px;
                width: 60px;
                border-color: rgb(41, 118, 211);
                border-radius: 2px;
                border-width: 1px;
                cursor: pointer;
                border-style: solid;
                transition: opacity 3s;
            }

            .join:hover {
                background-color: rgb(41, 118, 211);
                color: white;
            }

            .tweet {
                background-color: rgb(2, 137, 255);
                color: white;
                border-radius: 25px;
                border: none;
                width: 90px;
                height: 35px;
                cursor: pointer;
                font-weight: bold;
                font-size: 15px;
                margin-left: 5px;
                transition: 1s;
                /*x, y, blur e cor*/
            }

            .tweet:hover {
                box-shadow: 3px 2px 10px rgb(0, 0, 0);
            }
        </style>
    </head>
    <body>
        <button class="sub">SUBSCRIBE</button>
        <button class="join">JOIN</button>
        <button class="tweet">TWEET</button>
    </body>
</html>
