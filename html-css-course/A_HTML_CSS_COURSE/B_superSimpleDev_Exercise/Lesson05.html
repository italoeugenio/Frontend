<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lesson 05</title>
        <style>
            p{
                font-family: Arial;
                margin-top: 0;
            }

            .video-title {
                font-weight: bold;
                font-size: 15px;
                width: 300px;
                line-height: 20px;
            }

            .video-stats{
                font-size: 14px;
                color: rgb(96,96,96);
            }

            .video-author{
                font-size: 14px;
                color: rgb(96,96,96);
                margin-bottom: 100px;
            }

            .apple-text{
                margin-bottom: 50px;
                font-size: 14px;
                background-color: rgb(227,65,64);
                color: white;
                text-align: center;
                padding-top: 18px;
                padding-bottom: 18px;
            }

            .span-example{
                color: white;
                cursor: pointer;
                cursor: pointer;
            }

            .span-example:hover{
                text-decoration: underline;
            }
            

        </style>
    </head>
    <body>
        <p class="video-title">
            Talking Tech and AI with Google CEO Sundar Pichai!
        </p>

        <p class="video-stats">3.4M views &#183 6 mounth ago</p>

        <p class="video-author">Marques Browlee</p>

        <p class="apple-text">Shop early for the best selection of holiday favourites <span class="span-example">Shop now ></span></p>


    </body>
</html>
