<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Flexbox exercises</title>
        <style>
            .ex01 {
                display: flex;
            }

            .a1 {
                background-color: lightblue;
                width: 200px;
            }

            .b1 {
                background-color: lightpink;
                width: 75px;
            }

            .ex02 {
                display: flex;
            }

            .a2 {
                background-color: lightblue;
                width: 50px;
            }

            .b2 {
                background-color: lightpink;
                flex: 1;
            }

            .c2 {
                background-color: lightblue;
                width: 75px;
            }

            .ex03 {
                display: flex;
                justify-content: space-between;
            }

            .a3 {
                background-color: lightpink;
            }

            .b3 {
                background-color: lightpink;
            }

            .c3 {
                background-color: lightpink;
            }

            .d3 {
                background-color: lightpink;
            }

            .ex04 {
                display: flex;
                border: 1px solid gray;
                height: 50px;
                align-items: center;
                justify-content: space-between;
            }

            .a4 {
                background-color: lightpink;
            }

            .b4 {
                background-color: lightpink;
            }
        </style>
    </head>
    <body>
        <div class="ex01">
            <div class="a1">200px</div>
            <div class="b1">75px</div>
        </div>
        <br />
        <div class="ex02">
            <div class="a2">item1</div>
            <div class="b2">item2</div>
            <div class="c2">item3</div>
        </div>
        <br />
        <div class="ex03">
            <div class="a3">item1</div>
            <div class="b3">item2</div>
            <div class="c3">item3</div>
            <div class="d3">item4</div>
        </div>
        <div class="ex04">
            <div class="a4">item1</div>
            <div class="b4">item2</div>
        </div>
    </body>
</html>
