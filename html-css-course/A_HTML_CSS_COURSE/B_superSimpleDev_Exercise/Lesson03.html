<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lesson 03</title>

        <style>
            .uber {
                background-color: black;
                color: whitesmoke;
                border: none;
                cursor: pointer;
                transition: 0.5s;
            }

            .uber:hover{
                background-color: rgb(129, 129, 129);
            }

            .amazon {
                background-color: yellow;
                color: black;
                border-radius: 103px;
                border: none;
                height: 30px;
                width: 100px;
                cursor: pointer;
            }

            .amazon:hover{
                background-color: rgb(255, 221, 0);
            }

            .singup {
                background-color: rgb(22, 151, 22);
                color: white;
                border: none;
                border-radius: 4px;
                font-weight: bold;
                cursor: pointer;
                opacity: 1px;
            }

            .singup:hover{
                box-shadow: 3px 2px 10px black;
            }

            .bootstrap {
                background-color: rgb(176, 114, 230);
                border: none;
                border-radius: 5px;
                color: white;
                font-weight: bold;
                cursor: pointer;
                transition: 2s;
            }

            .bootstrap:hover{
                background-color: rgb(137, 36, 226);
            }

            .download {
                background-color: white;
                border-color: rgb(108, 117, 125);
                color: rgb(108, 117, 125);
                border-style: solid;
                font-weight: bold;
                cursor: pointer;
                border-width: 1px;
                transition: 1s;
            }

            .download:hover{
                background-color: rgb(108, 117, 125);
                color: white
            }

            .apply {
                background-color: rgb(34, 108, 192);
                color: white;
                border: none;
                font-weight: bold;
                border-radius: 20px;
            }

            .save {
                background-color: white;
                color: blue;
                border-style: solid;
                border-width: 1px;
                border-color: blue;
                border-radius: 20px;
            }

            .exercise {
                margin-bottom: 30px;
            }
            
            .price{
                color: rgb(0, 118, 0);
            }

            .buttons-amazon{
                display: flex;
                margin: 10px;
                gap: 10px;
            }


            .button-style{
                background-color: gray;
                width: 100px;
                height: 30px;
                border: none;
                border-radius: 20px;
                cursor: pointer;
            }

            .buttons-amazon .cart{
                background-color: rgb(255, 216, 20);
            }
            .buttons-amazon .cart:active{
                background-color: rgba(181, 151, 0, 0.828);
            }

            .buttons-amazon .buy{
                background-color: rgb(255, 164, 28);
            }

            .buttons-amazon .buy:active{
                background-color: rgb(156, 95, 3);
            }

            .amazon-back{
                cursor: pointer;
            }

        
        </style>
    </head>
    <body>
        <div class="exercise">
            <button class="uber">Request now</button>
            <button class="amazon">Add to Cart</button>
            <button class="singup">Sing up</button>
            <button class="bootstrap">Get started</button>
            <button class="download">Download</button>
            <button class="apply">Apply on company website</button>
            <button class="save">Save</button>
        </div>

        <div class="challenge">
            <a href="" class="amazon-back">Back to amazon</a>
            <h3>Nike Black Running Shoes</h1>
            <h4 class="price">$39 - in stock</h4>  
            <p>Free delivery tomorrow</p>
            <div class="buttons-amazon">
                <button class="button-style cart">Add to Cart</button>
                <button class="button-style buy">Buy Now</button>
            </div> 
        </div>
    </body>
</html>
