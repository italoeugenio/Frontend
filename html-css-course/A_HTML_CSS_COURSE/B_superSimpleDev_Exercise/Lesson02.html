<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lesson 02</title>

        <style>
            .uber {
                background-color: black;
                color: whitesmoke;
                border: none;
                cursor: pointer;
            }

            .amazon {
                background-color: yellow;
                color: black;
                border-radius: 103px;
                border: none;
                height: 30px;
                width: 100px;
                cursor: pointer;
            }

            .singup {
                background-color: rgb(22, 151, 22);
                color: white;
                border: none;
                border-radius: 4px;
                font-weight: bold;
                cursor: pointer;
            }

            .bootstrap {
                background-color: rgb(176, 114, 230);
                border: none;
                border-radius: 5px;
                color: white;
                font-weight: bold;
                cursor: pointer;
            }

            .download {
                background-color: white;
                border-color: rgb(108, 117, 125);
                color: rgb(108, 117, 125);
                border-style: solid;
                font-weight: bold;
                cursor: pointer;
                border-width: 1px;
            }

            .apply {
                background-color: rgb(34, 108, 192);
                color: white;
                border: none;
                font-weight: bold;
                border-radius: 20px;
            }

            .save {
                background-color: white;
                color: blue;
                border-style: solid;
                border-width: 1px;
                border-color: blue;
                border-radius: 20px;
            }

            .exercise {
                margin-bottom: 30px;
            }
            
            .price{
                color: rgb(0, 118, 0);
            }

            .buttons-amazon{
                display: flex;
                margin: 10px;
                gap: 10px;
            }


            .button-style{
                background-color: gray;
                width: 100px;
                height: 30px;
                border: none;
                border-radius: 20px;
            }

            .buttons-amazon .cart{
                background-color: rgb(255, 216, 20);
            }

            .buttons-amazon .buy{
                background-color: rgb(255, 164, 28);
            }
        </style>
    </head>
    <body>
        <div class="exercise">
            <button class="uber">Request now</button>
            <button class="amazon">Add to Cart</button>
            <button class="singup">Sing up</button>
            <button class="bootstrap">Get started</button>
            <button class="download">Download</button>
            <button class="apply">Apply on company website</button>
            <button class="save">Save</button>
        </div>

        <div class="challenge">
            <a href="">Back to amazon</a>
            <h3>Nike Black Running Shoes</h1>
            <h4 class="price">$39 - in stock</h4>  
            <p>Free delivery tomorrow</p>
            <div class="buttons-amazon">
                <button class="button-style cart">Add to Cart</button>
                <button class="button-style buy">Buy Now</button>
            </div> 
        </div>
    </body>
</html>
