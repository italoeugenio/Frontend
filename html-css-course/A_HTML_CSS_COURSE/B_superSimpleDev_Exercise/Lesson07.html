<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lesson 07</title>
        <style>
            .cat {
                width: 200px;
                height: 200px;
            }

            .cat.rounded {
                border-radius: 20px;
            }

            .cat.square {
                width: 200px;
                height: 200px;
                object-fit: cover;
                object-position: center;
            }

            .cat.circle {
                border-radius: 100%;
            }

            .search-input {
                font-size: 20px;
                width: 80%;
                height: 40px;
                border-style: solid;
                border-radius: 10px;
                margin-bottom: 10px;
            }

            .search-google {
                padding-left: 20px;
                font-size: 20px;
                width: 80%;
                height: 40px;
                border: none;
                border-radius: 25px;
                box-shadow: 0px 1px 10px rgba(0, 0, 0, 0.25);
                margin-bottom: 20px;
            }

            .profile-picture {
                width: 50px;
                height: 50px;
                object-fit: cover;
                border-radius: 25px;
                vertical-align: middle;
                margin-right: 5px;
            }

            .text-box {
                font-size: 18px;
                border: none;
                width: 300px;
                vertical-align: middle;
            }

            .tweet-button {
                background-color: rgb(29, 155, 240);
                color: white;
                border: none;
                padding-top: 8px;
                padding-bottom: 8px;
                padding-left: 16px;
                padding-right: 16px;
                border-radius: 30px;
                font-size: 16px;
                font-weight: bold;
                vertical-align: middle;
            }
        </style>
    </head>
    <body>
        <img class="cat rounded" src="./cat.jpg" alt="" />
        <img class="cat square" src="./cat.jpg" alt="" />
        <img class="cat circle" src="./cat.jpg" alt="" />
        <div>
            <input class="search-input" placeholder="Search" type="text" />
            <input
                class="search-google"
                placeholder="Search Google or type a URL"
                type="text"
            />
        </div>

        <img class="profile-picture" src="cat.jpg" />
        <input type="text" class="text-box" placeholder="What's happening?" />
        <button class="tweet-button">Tweet</button>
    </body>
</html>
